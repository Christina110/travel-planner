    }
    .gradient-text {
      background: linear-gradient(135deg, #00D9C5 0%, #00A8A0 50%, #008078 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glow-text {
      text-shadow: 0 0 30px rgba(0, 217, 197, 0.6), 0 0 60px rgba(0, 217, 197, 0.3);
    }
    .glow-border {
      box-shadow: 0 0 25px rgba(0, 217, 197, 0.4), inset 0 0 20px rgba(0, 217, 197, 0.1);
    }
    .btn-glow {
      box-shadow: 0 0 20px rgba(0, 217, 197, 0.5), 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .btn-glow:hover {
      box-shadow: 0 0 35px rgba(0, 217, 197, 0.7), 0 6px 20px rgba(0, 0, 0, 0.4);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 1; transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out;
    }
    .animate-slideInRight {
      animation: slideInRight 0.3s ease-out;
    }
    .animate-slideInLeft {
      animation: slideInLeft 0.3s ease-out;
    }
    .animate-slideInUp {
      animation: slideInUp 0.4s ease-out;
    }
    .animate-scaleIn {
      animation: scaleIn 0.25s ease-out;
    }
    .animate-pulse {
      animation: pulse 2s infinite;
    }
    .animate-bounceIn {
      animation: bounceIn 0.5s ease-out;
    }
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    .btn-press:active {
      transform: scale(0.98);
      transition: transform 0.1s ease;
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }
    .page-transition {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .page-leaving {
      opacity: 0;
      transform: translateX(-20px);
    }
    .page-entering {
      opacity: 1;
      transform: translateX(0);
    }
  </style>

    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [pageHistory, setPageHistory] = useState([]);
      const [trips, setTrips] = useState([]);
      const [currentTrip, setCurrentTrip] = useState(null);

      const [aiGuideText, setAiGuideText] = useState('');
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [transitionDirection, setTransitionDirection] = useState('forward');

      const navigateTo = (page) => {
        setIsTransitioning(true);
        setTransitionDirection('forward');
        setTimeout(() => {
          setPageHistory(prev => [...prev, currentPage]);
          setCurrentPage(page);
          setTimeout(() => setIsTransitioning(false), 50);
        }, 200);
      };

      const goBack = () => {
        if (pageHistory.length === 0) {
          setCurrentPage('home');
          return;
        }
        setIsTransitioning(true);
        setTransitionDirection('backward');
        setTimeout(() => {
          const prevPage = pageHistory[pageHistory.length - 1];

        if ('Notification' in window) {
          const permission = await Notification.requestPermission();
          return permission === 'granted';

        return false;

      const sendNotification = (title, options = {}) => {
        if ('Notification' in window && Notification.permission === 'granted') {

            body: options.body || '',
            icon: options.icon || 'https://cdn-icons-png.flaticon.com/512/3242/3242257.png',
            badge: options.badge || 'https://cdn-icons-png.flaticon.com/512/3242/3242257.png',
            ...options

      };

        const tripDate = new Date(trip.startDate);
        const now = new Date();
        const diff = tripDate.getTime() - now.getTime();
        
        if (diff > 0) {
          const oneDayBefore = diff - 24 * 60 * 60 * 1000;
          const oneHourBefore = diff - 60 * 60 * 1000;
          
          if (oneDayBefore > 0) {
            setTimeout(() => {
              sendNotification('旅行提醒', {
                body: `明天就要出发去${trip.destination}啦！记得收拾好行李哦~`,
                tag: 'trip-reminder'
              });
            }, oneDayBefore);
          }
          
          if (oneHourBefore > 0) {
            setTimeout(() => {
              sendNotification('旅行提醒', {
                body: `还有1小时就要出发去${trip.destination}啦！`,
                tag: 'trip-reminder'
              });
            }, oneHourBefore);

        }

    const ItineraryPage = ({ trip, theme }) => {
      const [generatedItinerary, setGeneratedItinerary] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);
      const attractions = window.getDefaultAttractions(trip.destination);

      useEffect(() => {
        setGeneratedItinerary(null);
      }, [trip.startDate, trip.endDate]);

      const calculateDuration = () => {
        const start = new Date(trip.startDate);
        const end = new Date(trip.endDate);
        const diffTime = Math.abs(end - start);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        return diffDays;
      };

      const generateItinerary = () => {
        setIsGenerating(true);
        setTimeout(() => {
          const days = calculateDuration();
          const rawItinerary = window.generateItinerary(trip.destination, days);
          
          const itinerary = rawItinerary.map((dayPlan, index) => {
            const activities = [];
            
            if (index === 0) {
              activities.push({ time: '08:00', type: 'info', content: `从${trip.destination}出发，开启旅程`, icon: 'navigation', slot: 'morning' });
            }
            
            const timeSlots = [
              { slot: 'morning', time: dayPlan.morning?.time, data: dayPlan.morning },
              { slot: 'morning', time: dayPlan.morning2?.time, data: dayPlan.morning2 },
              { slot: 'afternoon', time: dayPlan.lunch?.time, data: dayPlan.lunch, isFood: true },
              { slot: 'afternoon', time: dayPlan.afternoon?.time, data: dayPlan.afternoon },
              { slot: 'afternoon', time: dayPlan.afternoon2?.time, data: dayPlan.afternoon2 },
              { slot: 'evening', time: dayPlan.dinner?.time, data: dayPlan.dinner, isFood: true },
              { slot: 'evening', time: dayPlan.evening?.time, data: dayPlan.evening },
            ];
            
            timeSlots.forEach(({ slot, time, data, isFood }) => {
              if (!time || !data) return;
              
              if (isFood) {
                activities.push({ 
                  time, 
                  type: 'food', 
                  slot,
                  ...data.food 
                });
              } else {
                activities.push({ 
                  time, 
                  type: 'attraction', 
                  slot,
                  name: data.attraction?.name || '',
                  desc: data.attraction?.desc || '',
                  category: data.attraction?.type || '',
                  lat: data.attraction?.lat,
                  lng: data.attraction?.lng,
                  openTime: data.attraction?.openTime,
                  ticketPrice: data.attraction?.ticketPrice,
                  duration: data.attraction?.duration,
                  facilities: data.facilities,
                  eveningActivity: data.activity,
                });
              }
            });
            
            if (index === rawItinerary.length - 1) {
              activities.push({ time: '14:00', type: 'info', content: `返回${trip.destination}，结束行程`, icon: 'home', slot: 'afternoon' });
            }
            
            activities.sort((a, b) => a.time.localeCompare(b.time));
            
            return {
              day: dayPlan.day,
              date: index === 0 ? trip.startDate : '',
              routeDistance: dayPlan.routeDistance,
              morning: activities.filter(a => a.slot === 'morning'),
              afternoon: activities.filter(a => a.slot === 'afternoon'),
              evening: activities.filter(a => a.slot === 'evening'),
            };
          });

          setGeneratedItinerary(itinerary);
          setIsGenerating(false);
        }, 1500);
      };

      const getTimeSlotStyle = (slot) => {
        if (slot === 'morning') return { bg: 'bg-blue-500/10', border: 'border-blue-500/30', label: '上午', icon: 'sunrise' };
        if (slot === 'afternoon') return { bg: 'bg-orange-500/10', border: 'border-orange-500/30', label: '下午', icon: 'sunny' };
        return { bg: 'bg-purple-500/10', border: 'border-purple-500/30', label: '晚上', icon: 'sunset' };
      };

      return (
        <div className="pb-20 animate-fadeIn">
          <h2 className="text-2xl font-bold mb-2 text-white">{trip.destination}行程规划</h2>
          <p className="text-white/60 text-sm mb-6">共{calculateDuration()}天，{generatedItinerary ? generatedItinerary.reduce((sum, day) => sum + [...day.morning, ...day.afternoon, ...day.evening].filter(a => a.type === 'attraction').length, 0) : attractions.length}个景点</p>

          {!generatedItinerary ? (
            <div className="glass-card rounded-2xl p-8 text-center">
              <div className="w-20 h-20 mx-auto mb-4 rounded-full bg-blue-500/20 flex items-center justify-center">
                <span className="material-icons text-4xl text-blue-400">route</span>
              </div>
              <h3 className="text-xl font-bold mb-2 text-white">智能行程规划</h3>
              <p className="text-white/60 text-sm mb-6">
                根据您的旅行天数，为您自动规划最佳行程路线，包含景点游玩和美食推荐
              </p>
              <button
                onClick={generateItinerary}
                disabled={isGenerating}
                className={`w-full py-3 rounded-xl font-bold transition-all ${
                  isGenerating
                    ? 'bg-white/10 text-white/40 cursor-not-allowed'
                    : 'bg-gradient-to-r from-[#00D9C5] to-[#00A8A0] text-white hover:opacity-90'
                }`}
              >
                {isGenerating ? (
                  <span className="flex items-center justify-center gap-2">
                    <span className="animate-spin material-icons">refresh</span>
                    正在生成...
                  </span>
                ) : (
                  '一键生成行程'
                )}
              </button>
            </div>
          ) : (
            <div className="space-y-6">
              {generatedItinerary.map((dayPlan) => (
                <div key={dayPlan.day} className="glass-card rounded-xl overflow-hidden">
                  <div className="bg-gradient-to-r from-[#00D9C5] to-[#00A8A0] p-4 text-[#071A2B]">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                          <span className="font-bold">D{dayPlan.day}</span>
                        </div>
                        <div>
                          <h3 className="font-bold text-white">第{dayPlan.day}天</h3>
                          {dayPlan.date && <p className="text-white/80 text-sm">{dayPlan.date}</p>}
                          <div className="flex flex-wrap gap-2 mt-1">
                            {dayPlan.morning && dayPlan.morning.attraction && (
                              <span className="px-2 py-0.5 bg-white/20 rounded text-xs">{dayPlan.morning.attraction.name}</span>
                            )}
                            {dayPlan.morning2 && dayPlan.morning2.attraction && (
                              <span className="px-2 py-0.5 bg-white/20 rounded text-xs">{dayPlan.morning2.attraction.name}</span>
                            )}
                            {dayPlan.afternoon && dayPlan.afternoon.attraction && (
                              <span className="px-2 py-0.5 bg-white/20 rounded text-xs">{dayPlan.afternoon.attraction.name}</span>
                            )}
                            {dayPlan.afternoon2 && dayPlan.afternoon2.attraction && (
                              <span className="px-2 py-0.5 bg-white/20 rounded text-xs">{dayPlan.afternoon2.attraction.name}</span>
                            )}
                            {dayPlan.evening && dayPlan.evening.attraction && (
                              <span className="px-2 py-0.5 bg-white/20 rounded text-xs">{dayPlan.evening.attraction.name}</span>
                            )}
                          </div>
                        </div>
                      </div>
                      <span className="text-sm bg-white/20 px-3 py-1 rounded-full">
                        {dayPlan.morning.length + dayPlan.afternoon.length + dayPlan.evening.length}个活动
                      </span>
                    </div>
                  </div>

                  <div className="p-4">
                    {dayPlan.routeDistance > 0 && (
                      <div className="bg-green-50 rounded-lg p-3 mb-4 flex items-center gap-2">
                        <span className="material-icons text-green-600">route</span>
                        <span className="text-sm text-green-700">今日行程距离：{dayPlan.routeDistance}公里</span>
                      </div>
                    )}
                    
                    {['morning', 'afternoon', 'evening'].map((slot) => {
                      const style = getTimeSlotStyle(slot);
                      const activities = dayPlan[slot];
                      if (!activities) return null;
                      
                      const activitiesArray = Array.isArray(activities) ? activities : [activities];
                      if (activitiesArray.length === 0) return null;
                      
                      return (
                        <div key={slot} className={`mb-4 ${slot !== 'evening' ? 'pb-4 border-b border-white/10' : ''}`}>
                          <div className="flex items-center gap-2 mb-3">
                            <span className="material-icons text-sm" style={{ color: slot === 'morning' ? '#60A5FA' : slot === 'afternoon' ? '#FB923C' : '#A78BFA' }}>
                              {style.icon}
                            </span>
                            <span className="font-medium text-white/80">{style.label}</span>
                          </div>
                          
                          <div className="space-y-3">
                            {activitiesArray.map((activity, index) => (
                              <div key={index} className={`rounded-lg ${style.bg} ${style.border} border overflow-hidden`}>
                                <div className="flex gap-3 p-3">
                                  <div className="flex-shrink-0">
                                    <span className="font-bold text-white/90">{activity.time}</span>
                                  </div>
                                  <div className="flex-1">
                                    {activity.type === 'attraction' ? (
                                      <div>
                                        <div className="flex items-center justify-between">
                                          <h4 className="font-medium text-white">{activity.name}</h4>
                                          {activity.lat && activity.lng && (
                                            <button 
                                              onClick={() => window.open(`https://maps.google.com?q=${activity.lat},${activity.lng}`)}
                                              className="text-cyan-400 hover:text-cyan-300"
                                            >
                                              <span className="material-icons text-sm">navigation</span>
                                            </button>
                                          )}
                                        </div>
                                        <p className="text-sm text-white/70">{activity.desc}</p>
                                        <div className="flex items-center gap-3 mt-1 text-xs text-white/50">
                                          {activity.duration && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">hourglass_empty</span>
                                              建议游玩{activity.duration}小时
                                            </span>
                                          )}
                                          {activity.openTime && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">schedule</span>
                                              {activity.openTime}
                                            </span>
                                          )}
                                          {activity.ticketPrice !== undefined && activity.ticketPrice !== null && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">attach_money</span>
                                              {activity.ticketPrice === 0 ? '免费' : `${activity.ticketPrice}元`}
                                            </span>
                                          )}
                                        </div>
                                      </div>
                                    ) : activity.type === 'food' ? (
                                      <div>
                                        <h4 className="font-medium text-white">🍽️ {activity.name}</h4>
                                        <p className="text-sm text-white/60">{activity.shop} · {activity.desc}</p>
                                      </div>
                                    ) : (
                                      <div>
                                        <h4 className="font-medium text-white">
                                          <span className="material-icons text-sm text-blue-500">{activity.icon}</span>
                                          {activity.content}
                                        </h4>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                
                                {activity.type === 'attraction' && activity.facilities && (
                                  <div className="px-3 pb-3">
                                    <div className="bg-white/80 rounded-lg p-2">
                                      <div className="flex flex-wrap gap-2">
                                        {activity.facilities.toilets && activity.facilities.toilets.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const toilet = activity.facilities.toilets[0];
                                              window.open(`https://maps.google.com?q=${toilet.lat},${toilet.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs hover:bg-yellow-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">wc</span>
                                            厕所 ({activity.facilities.toilets[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.subwayStations && activity.facilities.subwayStations.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const station = activity.facilities.subwayStations[0];
                                              window.open(`https://maps.google.com?q=${station.lat},${station.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">directions_subway</span>
                                            地铁 ({activity.facilities.subwayStations[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.busStations && activity.facilities.busStations.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const station = activity.facilities.busStations[0];
                                              window.open(`https://maps.google.com?q=${station.lat},${station.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-green-100 text-green-700 rounded text-xs hover:bg-green-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">directions_bus</span>
                                            公交 ({activity.facilities.busStations[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.supermarkets && activity.facilities.supermarkets.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const market = activity.facilities.supermarkets[0];
                                              window.open(`https://maps.google.com?q=${market.lat},${market.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs hover:bg-orange-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">shopping_cart</span>
                                            超市 ({activity.facilities.supermarkets[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.hospitals && activity.facilities.hospitals.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const hospital = activity.facilities.hospitals[0];
                                              window.open(`https://maps.google.com?q=${hospital.lat},${hospital.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-red-100 text-red-700 rounded text-xs hover:bg-red-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">local_hospital</span>
                                            医院 ({activity.facilities.hospitals[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}

              <div className="bg-blue-50 rounded-xl p-4">
                <h4 className="font-bold text-white mb-2 flex items-center gap-2">
                  <span className="material-icons">tips_and_updates</span>
                  行程小贴士
                </h4>
                <ul className="text-sm text-blue-600 space-y-1">
                  {window.getCityTravelTips(trip.destination).map((tip, index) => (
                    <li key={index}>• {tip}</li>
                  ))}
                </ul>
              </div>

              <button
                onClick={generateItinerary}
                className="w-full py-3 bg-gray-100 text-white rounded-xl font-medium hover:bg-gray-200 transition-colors"
              >
                重新生成行程
              </button>
            </div>
          )}
        </div>
      );
    };

    const SmartItineraryPage = ({ currentTrip, setCurrentTrip, navigateTo }) => {
      const getLatestTrip = () => {
        const tripsData = JSON.parse(localStorage.getItem('travel_trips') || '[]');
        console.log('=== SmartItineraryPage DEBUG ===');
        console.log('localStorage tripsData:', tripsData);
        console.log('currentTrip prop:', currentTrip);
        
        let result = null;
        if (tripsData.length > 0) {
          if (currentTrip) {
            const found = tripsData.find(t => t.id === currentTrip.id);
            console.log('Found trip by id:', found);
            if (found) result = found;
          }
          if (!result) {
            result = tripsData[tripsData.length - 1];
            console.log('Using last trip:', result);
          }
        } else if (currentTrip) {
          result = currentTrip;
          console.log('Using currentTrip prop:', result);
        }
        
        if (!result && currentTrip) {
          result = currentTrip;
          console.log('Fallback to currentTrip prop:', result);
        }
        
        if (result) {
          const calculatedDays = Math.ceil((new Date(result.endDate) - new Date(result.startDate)) / (1000 * 60 * 60 * 24)) + 1;
          console.log('Calculated days:', calculatedDays, '| startDate:', result.startDate, '| endDate:', result.endDate);
        }
        
        return result;
      };
      
      const [destination, setDestination] = useState('');
      const [days, setDays] = useState(3);
      const [generatedItinerary, setGeneratedItinerary] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);
      const [searchCity, setSearchCity] = useState('');

      useEffect(() => {
        const latestTrip = getLatestTrip();
        if (latestTrip && latestTrip.destination) {
          const tripDays = Math.ceil((new Date(latestTrip.endDate) - new Date(latestTrip.startDate)) / (1000 * 60 * 60 * 24)) + 1;
          setDestination(latestTrip.destination);
          setDays(tripDays);
        }
      }, [currentTrip]);

      const handleDaysChange = (newDays) => {
        setDays(newDays);
        if (currentTrip && setCurrentTrip) {
          const start = new Date(currentTrip.startDate);
          const end = new Date(start);
          end.setDate(start.getDate() + newDays - 1);
          const updatedTrip = {
            ...currentTrip,
            duration: newDays,
            endDate: end.toISOString().split('T')[0],
          };
          setCurrentTrip(updatedTrip);
          const tripsData = JSON.parse(localStorage.getItem('travel_trips') || '[]');
          const tripIndex = tripsData.findIndex(t => t.id === currentTrip.id);
          if (tripIndex !== -1) {
            tripsData[tripIndex] = updatedTrip;
            localStorage.setItem('travel_trips', JSON.stringify(tripsData));
          }
        }
      };
      
      const filteredCities = searchCity 
        ? window.searchCities(searchCity) 
        : window.getAllCities();

      const handleGenerate = () => {
        if (!destination) {
          alert('请选择目的地');
          return;
        }
        setIsGenerating(true);
        setTimeout(() => {
          const rawItinerary = window.generateItinerary(destination, days, destination, destination);
          
          const itinerary = rawItinerary.map((dayPlan, index) => {
            const activities = [];
            
            if (index === 0) {
              activities.push({ time: '08:00', type: 'info', content: `从${destination}出发，开启旅程`, icon: 'navigation', slot: 'morning' });
            }
            
            const timeSlots = [
              { slot: 'morning', time: dayPlan.morning?.time, data: dayPlan.morning },
              { slot: 'morning', time: dayPlan.morning2?.time, data: dayPlan.morning2 },
              { slot: 'afternoon', time: dayPlan.lunch?.time, data: dayPlan.lunch, isFood: true },
              { slot: 'afternoon', time: dayPlan.afternoon?.time, data: dayPlan.afternoon },
              { slot: 'afternoon', time: dayPlan.afternoon2?.time, data: dayPlan.afternoon2 },
              { slot: 'evening', time: dayPlan.dinner?.time, data: dayPlan.dinner, isFood: true },
              { slot: 'evening', time: dayPlan.evening?.time, data: dayPlan.evening },
            ];
            
            timeSlots.forEach(({ slot, time, data, isFood }) => {
              if (!time || !data) return;
              
              if (isFood) {
                activities.push({ 
                  time, 
                  type: 'food', 
                  slot,
                  ...data.food 
                });
              } else {
                activities.push({ 
                  time, 
                  type: 'attraction', 
                  slot,
                  name: data.attraction?.name || '',
                  desc: data.attraction?.desc || '',
                  category: data.attraction?.type || '',
                  lat: data.attraction?.lat,
                  lng: data.attraction?.lng,
                  openTime: data.attraction?.openTime,
                  ticketPrice: data.attraction?.ticketPrice,
                  duration: data.attraction?.duration,
                  facilities: data.facilities,
                  eveningActivity: data.activity,
                });
              }
            });
            
            if (index === rawItinerary.length - 1) {
              activities.push({ time: '14:00', type: 'info', content: `返回${destination}，结束行程`, icon: 'home', slot: 'afternoon' });
            }
            
            activities.sort((a, b) => a.time.localeCompare(b.time));
            
            return {
              day: dayPlan.day,
              routeDistance: dayPlan.routeDistance,
              morning: activities.filter(a => a.slot === 'morning'),
              afternoon: activities.filter(a => a.slot === 'afternoon'),
              evening: activities.filter(a => a.slot === 'evening'),
            };
          });

          setGeneratedItinerary(itinerary);
          setIsGenerating(false);
        }, 1500);
      };

      const getTimeSlotStyle = (slot) => {
        if (slot === 'morning') return { bg: 'bg-blue-500/10', border: 'border-blue-500/30', label: '上午', icon: 'sunrise' };
        if (slot === 'afternoon') return { bg: 'bg-orange-500/10', border: 'border-orange-500/30', label: '下午', icon: 'sunny' };
        return { bg: 'bg-purple-500/10', border: 'border-purple-500/30', label: '晚上', icon: 'sunset' };
      };

      const saveTrip = () => {
        let newTrip;
        if (currentTrip) {
          const start = new Date(currentTrip.startDate);
          const end = new Date(start);
          end.setDate(start.getDate() + days - 1);
          newTrip = {
            ...currentTrip,
            name: `${destination}${days}日游`,
            destination,
            duration: days,
            endDate: end.toISOString().split('T')[0],
          };
        } else {
          const start = new Date();
          const end = new Date(start);
          end.setDate(start.getDate() + days - 1);
          newTrip = {
            id: Date.now(),
            name: `${destination}${days}日游`,
            destination,
            duration: days,
            startDate: start.toISOString().split('T')[0],
            endDate: end.toISOString().split('T')[0],
            status: 'planning',
          };
        }
        setCurrentTrip(newTrip);
        navigateTo('tripDetail');
      };

      return (
        <div className="pb-20 animate-fadeIn">
          <h2 className="text-2xl font-bold mb-2 text-white">智能行程规划</h2>
          <p className="text-white/60 text-sm mb-6">输入目的地和天数，AI为您生成专属旅行计划</p>

          {!generatedItinerary ? (
            <div className="glass-card rounded-2xl p-6">
              <div className="mb-6">
                <label className="block text-sm font-medium text-white mb-2">选择目的地</label>
                <input 
                  type="text"
                  value={searchCity}
                  onChange={(e) => setSearchCity(e.target.value)}
                  placeholder="搜索目的地城市..."
                  className="w-full px-4 py-3 rounded-xl border border-[#00D9C5]/30 focus:border-[#00D9C5] focus:ring-2 focus:ring-[#00D9C5]/30 outline-none transition-all mb-3 bg-[#071A2B]/80 backdrop-blur-xl text-white placeholder-white/40"
                />
                <div className="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto">
                  {filteredCities.map(city => (
                    <button
                      key={city.name}
                      type="button"
                      onClick={() => {
                        const newDestination = city.name;
                        setDestination(newDestination);
                        setSearchCity('');
                        if (currentTrip && setCurrentTrip) {
                          const updatedTrip = {
                            ...currentTrip,
                            destination: newDestination,
                            name: `${newDestination}${days}日游`,
                          };
                          setCurrentTrip(updatedTrip);
                          const tripsData = JSON.parse(localStorage.getItem('travel_trips') || '[]');
                          const tripIndex = tripsData.findIndex(t => t.id === currentTrip.id);
                          if (tripIndex !== -1) {
                            tripsData[tripIndex] = updatedTrip;
                            localStorage.setItem('travel_trips', JSON.stringify(tripsData));
                          }
                        }
                      }}
                      className={`px-3 py-2 rounded-lg text-sm transition-colors ${
                        destination === city.name 
                          ? 'bg-[#00D9C5] text-[#071A2B] font-semibold shadow-[0_0_15px_rgba(0,217,197,0.5)]' 
                          : 'bg-[#00D9C5]/10 text-white/80 hover:bg-[#00D9C5]/30 border border-[#00D9C5]/20'
                      }`}
                    >
                      {city.name}
                    </button>
                  ))}
                </div>
              </div>

              <div className="mb-6">
                <label className="block text-sm font-medium text-white mb-2">旅行天数</label>
                <div className="flex items-center gap-4">
                  <input 
                    type="range"
                    min="1"
                    max="14"
                    value={days}
                    onChange={(e) => handleDaysChange(parseInt(e.target.value))}
                    className="flex-1 h-2 bg-[#00D9C5]/20 rounded-lg appearance-none cursor-pointer accent-[#00D9C5]"
                    style={{
                      background: `linear-gradient(to right, #00D9C5 0%, #00D9C5 ${((days - 1) / 13) * 100}%, rgba(0,217,197,0.2) ${((days - 1) / 13) * 100}%, rgba(0,217,197,0.2) 100%)`
                    }}
                  />
                  <span className="text-xl font-bold text-[#00D9C5] w-12 text-center">{days}天</span>
                </div>
                <div className="flex justify-between text-xs text-white/50 mt-2">
                  <span>1天</span>
                  <span>14天</span>
                </div>
              </div>

              <button
                onClick={handleGenerate}
                disabled={isGenerating || !destination}
                className={`w-full py-3 rounded-xl font-bold transition-all ${
                  isGenerating || !destination
                    ? 'bg-white/10 text-white/40 cursor-not-allowed'
                    : 'bg-gradient-to-r from-[#00D9C5] to-[#00A8A0] text-white hover:scale-[1.02] shadow-[0_0_20px_rgba(0,217,197,0.5)]'
                }`}
              >
                {isGenerating ? (
                  <span className="flex items-center justify-center gap-2">
                    <span className="animate-spin material-icons">refresh</span>
                    AI正在规划...
                  </span>
                ) : (
                  '生成智能行程'
                )}
              </button>
            </div>
          ) : (
            <div className="space-y-6">
              <div className="glass-card rounded-xl p-4 bg-gradient-to-r from-[#00D9C5] to-[#00A8A0] text-[#071A2B]">
                <div className="flex items-center justify-between">
                  <div>
                    <h3 className="font-bold text-xl">{destination}{days}日游</h3>
                    <p className="text-white/80 text-sm">{generatedItinerary.length}天行程规划</p>
                  </div>
                  <button
                    onClick={saveTrip}
                    className="px-4 py-2 bg-white/30 text-[#071A2B] rounded-lg font-medium hover:bg-white/50 transition-colors backdrop-blur-sm"
                  >
                    保存行程
                  </button>
                </div>
              </div>

              {generatedItinerary.map((dayPlan) => (
                <div key={dayPlan.day} className="glass-card rounded-xl overflow-hidden">
                  <div className="bg-gradient-to-r from-[#00D9C5] to-[#00A8A0] p-4 text-[#071A2B]">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                        <span className="font-bold">D{dayPlan.day}</span>
                      </div>
                      <div>
                        <h3 className="font-bold text-white">第{dayPlan.day}天</h3>
                        <div className="flex flex-wrap gap-2 mt-1">
                          {dayPlan.morning && dayPlan.morning.map && dayPlan.morning.map(act => act.type === 'attraction' && (
                            <span key={act.name} className="px-2 py-0.5 bg-white/20 rounded text-xs">{act.name}</span>
                          ))}
                          {dayPlan.afternoon && dayPlan.afternoon.map && dayPlan.afternoon.map(act => act.type === 'attraction' && (
                            <span key={act.name} className="px-2 py-0.5 bg-white/20 rounded text-xs">{act.name}</span>
                          ))}
                          {dayPlan.evening && dayPlan.evening.map && dayPlan.evening.map(act => act.type === 'attraction' && (
                            <span key={act.name} className="px-2 py-0.5 bg-white/20 rounded text-xs">{act.name}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="p-4">
                    {dayPlan.routeDistance > 0 && (
                      <div className="bg-green-50 rounded-lg p-3 mb-4 flex items-center gap-2">
                        <span className="material-icons text-green-600">route</span>
                        <span className="text-sm text-green-700">今日行程距离：{dayPlan.routeDistance}公里</span>
                      </div>
                    )}
                    
                    {['morning', 'afternoon', 'evening'].map((slot) => {
                      const style = getTimeSlotStyle(slot);
                      const activities = dayPlan[slot];
                      if (!activities) return null;
                      
                      const activitiesArray = Array.isArray(activities) ? activities : [activities];
                      if (activitiesArray.length === 0) return null;
                      
                      return (
                        <div key={slot} className={`mb-4 ${slot !== 'evening' ? 'pb-4 border-b border-white/10' : ''}`}>
                          <div className="flex items-center gap-2 mb-3">
                            <span className="material-icons text-sm" style={{ color: slot === 'morning' ? '#60A5FA' : slot === 'afternoon' ? '#FB923C' : '#A78BFA' }}>
                              {style.icon}
                            </span>
                            <span className="font-medium text-white/80">{style.label}</span>
                          </div>
                          
                          <div className="space-y-3">
                            {activitiesArray.map((activity, index) => (
                              <div key={index} className={`rounded-lg ${style.bg} ${style.border} border overflow-hidden`}>
                                <div className="flex gap-3 p-3">
                                  <div className="flex-shrink-0">
                                    <span className="font-bold text-white/90">{activity.time}</span>
                                  </div>
                                  <div className="flex-1">
                                    {activity.type === 'attraction' ? (
                                      <div>
                                        <div className="flex items-center justify-between">
                                          <h4 className="font-medium text-white">{activity.name}</h4>
                                          {activity.lat && activity.lng && (
                                            <button 
                                              onClick={() => window.open(`https://maps.google.com?q=${activity.lat},${activity.lng}`)}
                                              className="text-cyan-400 hover:text-cyan-300"
                                            >
                                              <span className="material-icons text-sm">navigation</span>
                                            </button>
                                          )}
                                        </div>
                                        <p className="text-sm text-white/70">{activity.desc}</p>
                                        <div className="flex items-center gap-3 mt-1 text-xs text-white/50">
                                          {activity.duration && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">hourglass_empty</span>
                                              建议游玩{activity.duration}小时
                                            </span>
                                          )}
                                          {activity.openTime && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">schedule</span>
                                              {activity.openTime}
                                            </span>
                                          )}
                                          {activity.ticketPrice !== undefined && activity.ticketPrice !== null && (
                                            <span className="flex items-center gap-1">
                                              <span className="material-icons text-xs">attach_money</span>
                                              {activity.ticketPrice === 0 ? '免费' : `${activity.ticketPrice}元`}
                                            </span>
                                          )}
                                        </div>
                                      </div>
                                    ) : activity.type === 'food' ? (
                                      <div>
                                        <h4 className="font-medium text-white">🍽️ {activity.name}</h4>
                                        <p className="text-sm text-white/60">{activity.shop} · {activity.desc}</p>
                                      </div>
                                    ) : (
                                      <div>
                                        <h4 className="font-medium text-white">
                                          <span className="material-icons text-sm text-blue-500">{activity.icon}</span>
                                          {activity.content}
                                        </h4>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                
                                {activity.type === 'attraction' && activity.facilities && (
                                  <div className="px-3 pb-3">
                                    <div className="bg-white/80 rounded-lg p-2">
                                      <div className="flex flex-wrap gap-2">
                                        {activity.facilities.toilets && activity.facilities.toilets.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const toilet = activity.facilities.toilets[0];
                                              window.open(`https://maps.google.com?q=${toilet.lat},${toilet.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs hover:bg-yellow-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">wc</span>
                                            厕所 ({activity.facilities.toilets[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.subwayStations && activity.facilities.subwayStations.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const station = activity.facilities.subwayStations[0];
                                              window.open(`https://maps.google.com?q=${station.lat},${station.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">directions_subway</span>
                                            地铁 ({activity.facilities.subwayStations[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.busStations && activity.facilities.busStations.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const station = activity.facilities.busStations[0];
                                              window.open(`https://maps.google.com?q=${station.lat},${station.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-green-100 text-green-700 rounded text-xs hover:bg-green-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">directions_bus</span>
                                            公交 ({activity.facilities.busStations[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.supermarkets && activity.facilities.supermarkets.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const market = activity.facilities.supermarkets[0];
                                              window.open(`https://maps.google.com?q=${market.lat},${market.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs hover:bg-orange-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">shopping_cart</span>
                                            超市 ({activity.facilities.supermarkets[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                        {activity.facilities.hospitals && activity.facilities.hospitals.length > 0 && (
                                          <button 
                                            onClick={() => {
                                              const hospital = activity.facilities.hospitals[0];
                                              window.open(`https://maps.google.com?q=${hospital.lat},${hospital.lng}`);
                                            }}
                                            className="flex items-center gap-1 px-2 py-1 bg-red-100 text-red-700 rounded text-xs hover:bg-red-200 transition-colors"
                                          >
                                            <span className="material-icons text-xs">local_hospital</span>
                                            医院 ({activity.facilities.hospitals[0]?.distance?.toFixed(1)}km)
                                          </button>
                                        )}
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}

              <div className="glass-card rounded-xl p-4 bg-[#00D9C5]/10 border border-[#00D9C5]/20">
                <h4 className="font-bold text-[#00D9C5] mb-2 flex items-center gap-2">
                  <span className="material-icons">tips_and_updates</span>
                  行程小贴士
                </h4>
                <ul className="text-sm text-white/70 space-y-1">
                  {window.getCityTravelTips(destination).map((tip, index) => (
                    <li key={index}>• {tip}</li>
                  ))}
                </ul>
              </div>

              <button
                onClick={() => setGeneratedItinerary(null)}
                className="w-full py-3 bg-white/10 text-white rounded-xl font-medium hover:bg-[#00D9C5]/20 transition-colors border border-[#00D9C5]/30"
              >
                重新规划
              </button>
            </div>
          )}
        </div>
      );
    };

    const MapPage = ({ destination, theme }) => {
      const mapRef = React.useRef(null);
      const attractions = window.getDefaultAttractions(destination);
      const city = window.getCityByName(destination);
      
      const centerLatLng = attractions.length > 0 
        ? [attractions[0].lat, attractions[0].lng]
        : city ? [city.lat, city.lng] : [39.9042, 116.4074];

      React.useEffect(() => {
        if (!window.L || !mapRef.current) return;
        
        const map = window.L.map(mapRef.current).setView(centerLatLng, attractions.length > 5 ? 12 : 13);
        
        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors',
        }).addTo(map);

        const greenIcon = window.L.divIcon({
          className: 'custom-div-icon',
          html: `<div style="background-color:#4CAF50;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.3)"></div>`,
          iconSize: [22, 22],
          iconAnchor: [11, 11],
        });

        attractions.forEach((attraction, index) => {
          const marker = window.L.marker([attraction.lat, attraction.lng], { icon: greenIcon })
            .addTo(map)
            .bindPopup(`<b>${index + 1}. ${attraction.name}</b><br>${attraction.desc}`);
        });

        if (attractions.length > 1) {
          const points = attractions.map(a => [a.lat, a.lng]);
          
          window.L.polyline(points, {
            color: '#2196F3',
            weight: 3,
            opacity: 0.7,
            dashArray: '5, 10',
          }).addTo(map);

          for (let i = 0; i < attractions.length - 1; i++) {
            const from = attractions[i];
            const to = attractions[i + 1];
            const midLat = (from.lat + to.lat) / 2;
            const midLng = (from.lng + to.lng) / 2;
            
            const routeInfo = getRouteInfo(from, to);
            const popupContent = `<b>${from.name} → ${to.name}</b><br>${routeInfo.mode}约${routeInfo.time}分钟<br>${routeInfo.distance}公里`;
            
            window.L.circleMarker([midLat, midLng], {
              radius: 6,
              fillColor: '#FF9800',
              color: '#fff',
              weight: 2,
              opacity: 1,
              fillOpacity: 1,
            }).addTo(map).bindPopup(popupContent);
          }
        }

        return () => {
          map.remove();
        };
      }, [centerLatLng, attractions]);

      return (
        <div className="pb-20 animate-fadeIn">
          <h2 className="text-2xl font-bold mb-6 text-white">{destination}景点分布图</h2>
          <div className="glass-card rounded-xl overflow-hidden shadow-sm">
            <div 
              ref={mapRef} 
              className="w-full h-96"
            ></div>
            <div className="px-4 py-3 bg-gray-50 border-t flex items-center gap-6 text-sm">
              <div className="flex items-center gap-2">
                <div className="w-4 h-4 rounded-full bg-green-500 border-2 border-white"></div>
                <span className="text-white/70">景点位置</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-12 h-0.5 bg-blue-500" style={{ backgroundImage: 'repeating-linear-gradient(to right, #2196F3, #2196F3 5px, transparent 5px, transparent 15px)' }}></div>
                <span className="text-white/70">游览路线</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-orange-500 border-2 border-white"></div>
                <span className="text-white/70">点击查看通勤信息</span>
              </div>
            </div>
          </div>
          <div className="mt-6 space-y-3">
            {attractions.map((attraction, index) => {
              const routeToNext = index < attractions.length - 1 ? getRouteInfo(attraction, attractions[index + 1]) : null;
              return (
                <div 
                  key={attraction.name}
                  className="glass-card rounded-xl p-4 flex items-center gap-4"
                >
                  <div className="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold">
                    {index + 1}
                  </div>
                  <img 
                    src={attraction.image} 
                    alt={attraction.name}
                    className="w-16 h-16 rounded-lg object-cover"
                  />
                  <div className="flex-1">
                    <h3 className="font-bold text-white">{attraction.name}</h3>
                    <p className="text-sm text-white/60">{attraction.type}</p>
                    {routeToNext && (
                      <p className="text-xs text-blue-600 mt-1">
                        → {routeToNext.mode}约{routeToNext.time}分钟到{routeToNext.to}
                      </p>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
